  <text x="56" y="76" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">TRADE #1 · PRIORITY HIGH</text>
  <text x="56" y="100" fill="#f1f5f9" font-size="18" font-weight="700">SOL  →  JUP</text>
  <text x="56" y="120" fill="#4ade80" font-size="15" font-weight="700">$620</text>
