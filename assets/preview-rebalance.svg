    </linearGradient>
  </defs>
  <rect width="720" height="320" fill="url(#bg2)"/>

  <text x="360" y="30" fill="#475569" font-size="11" text-anchor="middle" letter-spacing="3">PRISM · REBALANCE PLAN</text>

